<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHOTYPE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:ital@0;1&display=swap');

  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --border: #1e1e1e;
    --accent: #c8a96e;
    --accent2: #7a6040;
    --text: #e0d8cc;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
  }

  .container { max-width: 680px; margin: 0 auto; padding: 48px 20px 100px; }

  header { text-align: center; margin-bottom: 56px; }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 10vw, 5rem);
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .tagline { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 24px; }

  .divider { width: 40px; height: 1px; background: var(--accent2); margin: 0 auto; }

  .section-label { font-size: 9px; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; margin-bottom: 12px; display: block; }

  .artists-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }

  .artist-slot {
    background: var(--surface);
    border: none;
    border-bottom: 1px solid var(--accent2);
    padding: 11px 14px;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .artist-slot::placeholder { color: var(--muted); font-style: italic; font-size: 11px; }
  .artist-slot:focus { border-bottom-color: var(--accent); }

  .presets { margin-bottom: 20px; }
  .preset-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Courier Prime', monospace; font-size: 10px;
    cursor: pointer; letter-spacing: 1px; text-decoration: underline;
    text-underline-offset: 3px; margin-right: 14px; transition: color 0.2s;
  }
  .preset-btn:hover { color: var(--accent); }

  .analyze-btn {
    width: 100%; background: none; border: 1px solid var(--accent);
    color: var(--accent); padding: 18px;
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    font-style: italic; font-weight: 300; cursor: pointer;
    letter-spacing: 3px; transition: all 0.3s; margin-top: 16px;
    position: relative; overflow: hidden;
  }

  .analyze-btn::after {
    content: ''; position: absolute; inset: 0;
    background: var(--accent); transform: translateY(100%);
    transition: transform 0.3s ease; z-index: -1;
  }

  .analyze-btn:hover { color: var(--bg); }
  .analyze-btn:hover::after { transform: translateY(0); }

  .loading { display: none; text-align: center; padding: 80px 0; }
  .loading.visible { display: block; }

  .loading-symbol {
    font-family: 'Cormorant Garamond', serif; font-size: 40px;
    color: var(--accent); animation: spin 4s linear infinite;
    display: inline-block; margin-bottom: 20px;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .loading-text { font-size: 10px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; animation: pulse 2s infinite; }

  .result { display: none; }
  .result.visible { display: block; animation: fadeUp 0.8s ease; }

  .archetype-hero {
    text-align: center; padding: 40px 24px; border: 1px solid var(--border);
    margin-bottom: 28px; position: relative;
    background: linear-gradient(180deg, #0d0d0d 0%, #080808 100%);
  }

  .archetype-hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .archetype-greek { font-size: 9px; letter-spacing: 5px; color: var(--accent2); text-transform: uppercase; margin-bottom: 12px; min-height: 1px; }

  .archetype-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 7vw, 4rem);
    font-weight: 300; line-height: 1.1; margin-bottom: 8px;
  }

  .archetype-sub { font-size: 11px; color: var(--accent); letter-spacing: 1px; font-style: italic; margin-bottom: 28px; }

  .bars { text-align: left; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { font-size: 9px; letter-spacing: 1px; color: var(--muted); width: 150px; flex-shrink: 0; text-transform: uppercase; }
  .bar-label small { display: block; font-size: 8px; color: #333; margin-top: 1px; font-style: italic; text-transform: none; letter-spacing: 0; }
  .bar-track { flex: 1; height: 1px; background: var(--border); }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 1.8s cubic-bezier(0.25,0.46,0.45,0.94); width: 0; }
  .bar-pct { font-size: 10px; color: var(--accent2); width: 30px; text-align: right; }

  .result-block {
    border-left: 1px solid var(--border); padding: 18px 22px;
    margin-bottom: 10px; background: var(--surface); transition: border-color 0.3s;
  }
  .result-block:hover { border-left-color: var(--accent2); }

  .conflict-block {
    border: 1px solid var(--accent2); padding: 20px 22px;
    margin-bottom: 10px; background: #100c08;
  }

  .block-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .block-title { font-size: 8px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
  .block-sub { font-size: 9px; color: var(--muted); font-style: italic; }
  .block-text { font-size: 13px; line-height: 1.85; color: #bbb; }

  .practical-cols { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .practical-col-title { font-size: 10px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .practical-list { list-style: none; font-size: 13px; line-height: 1.9; color: #bbb; }
  .practical-list li::before { content: '— '; color: var(--accent2); }

  .formula-block {
    border: 1px solid var(--border); border-left: 2px solid var(--accent2);
    padding: 20px 22px; margin-bottom: 10px; background: #0a0808;
  }

  .formula-row { margin-bottom: 10px; font-size: 13px; line-height: 1.6; color: #bbb; }
  .formula-row span { font-size: 8px; letter-spacing: 2px; color: var(--accent2); text-transform: uppercase; display: block; margin-bottom: 3px; }

  .quote-wrap { padding: 28px 0; margin: 24px 0; position: relative; text-align: center; }
  .quote-wrap::before, .quote-wrap::after {
    content: ''; position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }
  .quote-wrap::before { top: 0; }
  .quote-wrap::after { bottom: 0; }

  .quote-text {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(1rem, 2.8vw, 1.3rem); font-weight: 300;
    line-height: 1.6; color: var(--accent); letter-spacing: 0.3px;
  }

  .disclaimer { font-size: 10px; line-height: 1.7; color: var(--muted); text-align: center; padding: 0 10px; margin-top: 20px; font-style: italic; }

  .reset-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Courier Prime', monospace; font-size: 10px;
    letter-spacing: 3px; cursor: pointer; text-transform: uppercase;
    margin-top: 40px; display: block; width: 100%; text-align: center;
    padding: 14px; border-top: 1px solid var(--border); transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--text); }

  .footer { text-align: center; font-size: 8px; color: #222; letter-spacing: 2px; text-transform: uppercase; margin-top: 12px; }

  .error-msg { color: #c87070; font-size: 11px; margin-top: 6px; display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">PSYCHO<span>TYPE</span></div>
    <div class="tagline">Твоя музыка — твоё зеркало</div>
    <div class="divider"></div>
  </header>

  <div id="form-section">
    <span class="section-label">Введи любимых исполнителей (5–8)</span>
    <div class="artists-grid">
      <input class="artist-slot" placeholder="исполнитель 1" />
      <input class="artist-slot" placeholder="исполнитель 2" />
      <input class="artist-slot" placeholder="исполнитель 3" />
      <input class="artist-slot" placeholder="исполнитель 4" />
      <input class="artist-slot" placeholder="исполнитель 5" />
      <input class="artist-slot" placeholder="исполнитель 6" />
      <input class="artist-slot" placeholder="исполнитель 7" />
      <input class="artist-slot" placeholder="исполнитель 8" />
    </div>

    <div class="presets">
      <span class="section-label" style="display:inline;margin-right:8px">Примеры:</span>
      <button class="preset-btn" onclick="loadPreset('dark')">тёмный романтик</button>
      <button class="preset-btn" onclick="loadPreset('indie')">инди-меланхолик</button>
      <button class="preset-btn" onclick="loadPreset('mainstream')">мейнстрим</button>
      <button class="preset-btn" onclick="loadPreset('russian')">русская сцена</button>
    </div>

    <div class="error-msg" id="error-msg">Введи хотя бы 3 исполнителя</div>
    <button class="analyze-btn" onclick="analyze()">Узнать свой психотип</button>
    <div class="footer">© 2026 Psychotype · Daniel Gelevsky</div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-symbol">⊕</div>
    <div class="loading-text" id="loading-text">Читаю твою душу...</div>
  </div>

  <div class="result" id="result">
    <div class="archetype-hero">
      <div class="archetype-greek" id="archetype-greek"></div>
      <div class="archetype-name" id="archetype-name"></div>
      <div class="archetype-sub" id="archetype-sub"></div>
      <div class="bars" id="bars"></div>
    </div>
    <div id="result-blocks"></div>
    <div class="quote-wrap"><div class="quote-text" id="quote-text"></div></div>
    <div class="disclaimer">Это вероятностная интерпретация музыкальных предпочтений через психологические модели, а не клиническая диагностика.</div>
    <button class="reset-btn" onclick="reset()">← пройти заново</button>
  </div>

</div>
<script>
const presets = {
  dark: ['Lebanon Hanover','She Past Away','Twin Tribes','Crystal Castles','Hante','Selofan','Molchat Doma','Clan of Xymox'],
  indie: ['Radiohead','Bon Iver','Portishead','Massive Attack','Beach House','Tame Impala','Nick Drake','James Blake'],
  mainstream: ['Taylor Swift','Billie Eilish','The Weeknd','Drake','Adele','Ed Sheeran','Coldplay','Imagine Dragons'],
  russian: ['Земфира','Кино','Аффинаж','Буерак','Монеточка','Oxxxymiron','Ploho','культодиночества']
};

const loadingTexts = ['Читаю твою душу...','Ищу твой психотип...','Погружаюсь в музыку...','Слышу тебя между строк...'];

function loadPreset(name) {
  const slots = document.querySelectorAll('.artist-slot');
  presets[name].forEach((a,i) => { if(slots[i]) slots[i].value = a; });
}

function getArtists() {
  return Array.from(document.querySelectorAll('.artist-slot')).map(s=>s.value.trim()).filter(Boolean);
}

async function analyze() {
  const artists = getArtists();
  if(artists.length < 3) { document.getElementById('error-msg').style.display='block'; return; }
  document.getElementById('error-msg').style.display='none';
  document.getElementById('form-section').style.display='none';

  const loading = document.getElementById('loading');
  loading.classList.add('visible');
  document.getElementById('loading-text').textContent = loadingTexts[Math.floor(Math.random()*loadingTexts.length)];

  const prompt = `Ты — психолог, работающий строго в рамках эмпирически подтверждённых моделей личности. Список любимых исполнителей человека: ${artists.join(', ')}.

Это не клиническая диагностика, а вероятностный психологический портрет, построенный на музыкальных предпочтениях как одном из сигналов личности. Не заявляй абсолютную точность.

ШАГ 1 — сначала найди пересечение: что объединяет именно ЭТИХ артистов вместе — по настроению, эмоциональной насыщенности, интроспективности, агрессии, романтизму, отчуждённости, интеллектуальной сложности, мрачности. На первый взгляд артисты могут казаться разными — найди, что их реально связывает.

ШАГ 2 — только из этого пересечения выведи психологический портрет, используя ТОЛЬКО три научно валидированные модели:
1. Большая пятёрка (Big Five/OCEAN) — открытость, добросовестность, экстраверсия, доброжелательность, нейротизм
2. Теория привязанности (Боулби/Эйнсворт) — надёжный/тревожный/избегающий/дезорганизованный тип
3. Тёмная триада (Полхус и Уильямс) — нарциссизм, макиавеллизм, психопатия

ВАЖНО: не используй архетипы, мифологию, эннеаграмму, соционику, тест Люшера, транзактный анализ или пирамиду Маслоу — только три модели выше.

ЯЗЫК ФОРМУЛИРОВОК — КРИТИЧЕСКИ ВАЖНО: никогда не пиши категоричных утверждений о личности человека ("ты привык к эмоциональной недоступности", "ты избегаешь близости"). Вместо этого используй вероятностные, осторожные формулировки: "в твоих музыкальных предпочтениях часто встречается тема X, что может быть связано с Y", "это может указывать на...", "нередко это сочетается с...". Смысл и глубина должны сохраниться, но тон — предположение психолога, а не диагноз.

ЗАГОЛОВОК: не создавай архетип-ярлык в стиле "Интроверт в чёрных одеждах" или "Тёмный романтик". Вместо этого — нейтральный, но точный заголовок в духе "Профиль: [доминирующая черта в 2-4 словах]" или "Паттерн: [суть в 2-4 словах]" — звучит как научный вывод, а не как гороскопный тип.
Для блока Большой пятёрки (b1) — не пиши один слитный абзац. Разбери КАЖДУЮ из пяти черт ОТДЕЛЬНЫМ пунктом (b1_openness, b1_conscientiousness, b1_extraversion, b1_agreeableness, b1_neuroticism) — 1-2 предложения на черту, с привязкой к конкретному артисту или паре артистов. Не повторяй одних и тех же артистов в каждом пункте — распредели обоснования по разным исполнителям из списка.

ВНУТРЕННИЙ КОНФЛИКT (новый обязательный блок, conflict_text) — найди среди восьми шкал (bars) две шкалы с наибольшим контрастом или наибольшим напряжением между собой (например высокая открытость при низкой экстраверсии, или высокий нейротизм при низком макиавеллизме). Опиши это как живое внутреннее противоречие человека, с привязкой к 1-2 артистам, которые это противоречие выражают в музыке. 3-4 предложения, конкретно и с драматургией, не абстрактно.

Для блоков b2 и b3 — как раньше, назови минимум 2-3 конкретных артиста по имени, с тем же осторожным вероятностным языком.

Блок "Практическое проявление" (b4) теперь — НЕ абзац текста, а три коротких списка (по 3 пункта в каждом, 3-6 слов на пункт, без глаголов "ты" в начале, просто короткие формулировки):
- b4_helps: что помогает человеку (среда, условия, форматы работы)
- b4_destroys: что разрушает / истощает
- b4_develop: что стоит развивать

Термины объясняй так, будто человек никогда не изучал психологию — используй метафоры, а не сухие определения.

Ответь ТОЛЬКО в JSON (без markdown):
{
  "title": "нейтральный заголовок-профиль 3-5 слов в духе 'Профиль: ...' или 'Паттерн: ...', НЕ архетип",
  "subtitle": "подзаголовок 5-7 слов, точный, без архетипичности",
  "quote": "убийственно точная фраза-зеркало 15-25 слов",
  "bars": [
    {"label": "Открытость опыту", "plain": "широта восприятия мира", "value": 85},
    {"label": "Добросовестность", "plain": "организованность и самодисциплина", "value": 60},
    {"label": "Экстраверсия", "plain": "откуда берёшь энергию", "value": 40},
    {"label": "Доброжелательность", "plain": "склонность к сотрудничеству", "value": 55},
    {"label": "Нейротизм", "plain": "интенсивность переживаний", "value": 78},
    {"label": "Надёжность привязанности", "plain": "как строишь близкие отношения", "value": 45},
    {"label": "Нарциссизм", "plain": "ощущение собственной особенности", "value": 38},
    {"label": "Макиавеллизм", "plain": "склонность добиваться своего манипуляцией", "value": 30}
  ],
  "b1_title": "Большая пятёрка",
  "b1_plain": "пять базовых черт личности",
  "b1_openness": "1-2 предложения про открытость опыту через конкретного артиста, вероятностным языком",
  "b1_conscientiousness": "1-2 предложения про добросовестность через конкретного артиста, вероятностным языком",
  "b1_extraversion": "1-2 предложения про экстраверсию через конкретного артиста, вероятностным языком",
  "b1_agreeableness": "1-2 предложения про доброжелательность через конкретного артиста, вероятностным языком",
  "b1_neuroticism": "1-2 предложения про нейротизм через конкретного артиста, вероятностным языком",
  "conflict_title": "Внутренний конфликт",
  "conflict_plain": "напряжение между двумя чертами",
  "conflict_text": "3-4 предложения о самом остром противоречии между двумя шкалами, с привязкой к артистам",
  "b2_title": "Тип привязанности",
  "b2_plain": "как любишь и боишься",
  "b2_text": "4-5 предложений через конкретных артистов, вероятностным языком",
  "b3_title": "Тёмная триада",
  "b3_plain": "скрытые черты личности",
  "b3_text": "4-5 предложений через конкретных артистов, вероятностным языком",
  "b4_title": "Практическое проявление",
  "b4_plain": "что помогает, что разрушает, что развивать",
  "b4_helps": ["пункт 1", "пункт 2", "пункт 3"],
  "b4_destroys": ["пункт 1", "пункт 2", "пункт 3"],
  "b4_develop": ["пункт 1", "пункт 2", "пункт 3"],
  "f_outside": "снаружи одна строчка",
  "f_inside": "внутри одна строчка",
  "f_strength": "главная сила",
  "f_weakness": "главная уязвимость"
}`;

  try {
    const res = await fetch("/.netlify/functions/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: prompt })
    });

    const data = await res.json();
    const text = data.content.map(i=>i.text||'').join('');
    const p = JSON.parse(text.replace(/```json|```/g,'').trim());

    loading.classList.remove('visible');

    document.getElementById('archetype-greek').textContent = '';
    document.getElementById('archetype-name').textContent = p.title;
    document.getElementById('archetype-sub').textContent = p.subtitle;

    const barsEl = document.getElementById('bars');
    barsEl.innerHTML = '';
    p.bars.forEach(b => {
      barsEl.innerHTML += `<div class="bar-row">
        <div class="bar-label">${b.label}<small>${b.plain}</small></div>
        <div class="bar-track"><div class="bar-fill" data-val="${b.value}%"></div></div>
        <div class="bar-pct">${b.value}%</div>
      </div>`;
    });

    const blocksEl = document.getElementById('result-blocks');
    blocksEl.innerHTML = '';

    if(p.b1_title) {
      const traits = [
        ['Открытость опыту', p.b1_openness],
        ['Добросовестность', p.b1_conscientiousness],
        ['Экстраверсия', p.b1_extraversion],
        ['Доброжелательность', p.b1_agreeableness],
        ['Нейротизм', p.b1_neuroticism]
      ];
      let traitsHtml = traits.filter(t=>t[1]).map(t =>
        `<div style="margin-bottom:14px"><b style="color:var(--accent);font-size:12px;letter-spacing:1px;text-transform:uppercase">${t[0]}</b><br>${t[1]}</div>`
      ).join('');
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header">
          <div class="block-title">${p.b1_title}</div>
          <div class="block-sub">${p.b1_plain}</div>
        </div>
        <div class="block-text">${traitsHtml}</div>
      </div>`;
    }

    if(p.conflict_title && p.conflict_text) {
      blocksEl.innerHTML += `<div class="conflict-block">
        <div class="block-header">
          <div class="block-title">⚡ ${p.conflict_title}</div>
          <div class="block-sub">${p.conflict_plain||''}</div>
        </div>
        <div class="block-text">${p.conflict_text}</div>
      </div>`;
    }

    [['b2',''],['b3','']].forEach(([key]) => {
      if(!p[key+'_title']) return;
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header">
          <div class="block-title">${p[key+'_title']}</div>
          <div class="block-sub">${p[key+'_plain']}</div>
        </div>
        <div class="block-text">${p[key+'_text']}</div>
      </div>`;
    });

    if(p.b4_title && (p.b4_helps || p.b4_destroys || p.b4_develop)) {
      const col = (title, items) => {
        if(!items || !items.length) return '';
        const lis = items.map(i => `<li>${i}</li>`).join('');
        return `<div><div class="practical-col-title">${title}</div><ul class="practical-list">${lis}</ul></div>`;
      };
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header">
          <div class="block-title">${p.b4_title}</div>
          <div class="block-sub">${p.b4_plain||''}</div>
        </div>
        <div class="practical-cols">
          ${col('Помогает', p.b4_helps)}
          ${col('Разрушает', p.b4_destroys)}
          ${col('Стоит развивать', p.b4_develop)}
        </div>
      </div>`;
    }

    if(p.f_outside) {
      blocksEl.innerHTML += `<div class="formula-block">
        <div class="block-title" style="margin-bottom:16px;font-size:8px;letter-spacing:3px;color:var(--accent);text-transform:uppercase">Итоговая формула</div>
        <div class="formula-row"><span>Снаружи</span>${p.f_outside}</div>
        <div class="formula-row"><span>Внутри</span>${p.f_inside}</div>
        <div class="formula-row"><span>Сила</span>${p.f_strength}</div>
        <div class="formula-row" style="margin-bottom:0"><span>Уязвимость</span>${p.f_weakness}</div>
      </div>`;
    }

    document.getElementById('quote-text').textContent = p.quote;
    document.getElementById('result').classList.add('visible');

    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.val; });
    }, 100);

  } catch(err) {
    loading.classList.remove('visible');
    document.getElementById('form-section').style.display='block';
    alert('Ошибка: ' + err.message);
  }
}

function reset() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('result-blocks').innerHTML='';
  document.getElementById('form-section').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
