<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHOTYPE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:ital@0;1&display=swap');

  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --border: #1e1e1e;
    --accent: #c8a96e;
    --accent2: #7a6040;
    --text: #e0d8cc;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
  }

  .container { max-width: 680px; margin: 0 auto; padding: 48px 20px 100px; }

  header { text-align: center; margin-bottom: 56px; }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 10vw, 5rem);
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .tagline { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 24px; }

  .divider { width: 40px; height: 1px; background: var(--accent2); margin: 0 auto; }

  .section-label { font-size: 9px; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; margin-bottom: 12px; display: block; }

  .artists-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }

  .artist-slot {
    background: var(--surface);
    border: none;
    border-bottom: 1px solid var(--accent2);
    padding: 11px 14px;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .artist-slot::placeholder { color: var(--muted); font-style: italic; font-size: 11px; }
  .artist-slot:focus { border-bottom-color: var(--accent); }

  .presets { margin-bottom: 20px; }
  .preset-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Courier Prime', monospace; font-size: 10px;
    cursor: pointer; letter-spacing: 1px; text-decoration: underline;
    text-underline-offset: 3px; margin-right: 14px; transition: color 0.2s;
  }
  .preset-btn:hover { color: var(--accent); }

  .analyze-btn {
    width: 100%; background: none; border: 1px solid var(--accent);
    color: var(--accent); padding: 18px;
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    font-style: italic; font-weight: 300; cursor: pointer;
    letter-spacing: 3px; transition: all 0.3s; margin-top: 16px;
    position: relative; overflow: hidden;
  }

  .analyze-btn::after {
    content: ''; position: absolute; inset: 0;
    background: var(--accent); transform: translateY(100%);
    transition: transform 0.3s ease; z-index: -1;
  }

  .analyze-btn:hover { color: var(--bg); }
  .analyze-btn:hover::after { transform: translateY(0); }

  .loading { display: none; text-align: center; padding: 80px 0; }
  .loading.visible { display: block; }

  .loading-symbol {
    font-family: 'Cormorant Garamond', serif; font-size: 40px;
    color: var(--accent); animation: spin 4s linear infinite;
    display: inline-block; margin-bottom: 20px;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

  .loading-text { font-size: 10px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; animation: pulse 2s infinite; }

  .result { display: none; }
  .result.visible { display: block; animation: fadeUp 0.8s ease; }

  .archetype-hero {
    text-align: center; padding: 40px 24px; border: 1px solid var(--border);
    margin-bottom: 28px; position: relative;
    background: linear-gradient(180deg, #0d0d0d 0%, #080808 100%);
  }

  .archetype-hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .archetype-greek { font-size: 9px; letter-spacing: 5px; color: var(--accent2); text-transform: uppercase; margin-bottom: 12px; min-height: 1px; }

  .archetype-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 7vw, 4rem);
    font-weight: 300; line-height: 1.1; margin-bottom: 8px;
  }

  .archetype-sub { font-size: 11px; color: var(--accent); letter-spacing: 1px; font-style: italic; margin-bottom: 20px; }

  .essence-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 28px; }
  .essence-tag { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent2); padding: 6px 12px; }

  .conflict-basis { font-size: 9px; color: var(--muted); font-style: italic; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }

  .confidence-stars { font-size: 10px; color: var(--accent2); margin-top: 10px; letter-spacing: 2px; }

  .music-function-list { list-style: none; margin: 8px 0 0; }
  .music-function-list li { font-size: 13px; line-height: 1.7; color: #bbb; padding-left: 14px; position: relative; margin-bottom: 4px; }
  .music-function-list li::before { content: '—'; position: absolute; left: 0; color: var(--accent2); }

  .bars { text-align: left; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { font-size: 9px; letter-spacing: 1px; color: var(--muted); width: 150px; flex-shrink: 0; text-transform: uppercase; }
  .bar-label small { display: block; font-size: 8px; color: #333; margin-top: 1px; font-style: italic; text-transform: none; letter-spacing: 0; }
  .bar-track { flex: 1; height: 1px; background: var(--border); }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 1.8s cubic-bezier(0.25,0.46,0.45,0.94); width: 0; }
  .bar-pct { font-size: 10px; color: var(--accent2); width: 30px; text-align: right; }

  .result-block {
    border-left: 1px solid var(--border); padding: 18px 22px;
    margin-bottom: 10px; background: var(--surface); transition: border-color 0.3s;
  }
  .result-block:hover { border-left-color: var(--accent2); }

  .block-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .block-title { font-size: 8px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
  .block-sub { font-size: 9px; color: var(--muted); font-style: italic; }
  .block-text { font-size: 13px; line-height: 1.85; color: #bbb; }

  .formula-block {
    border: 1px solid var(--border); border-left: 2px solid var(--accent2);
    padding: 20px 22px; margin-bottom: 10px; background: #0a0808;
  }

  .formula-row { margin-bottom: 10px; font-size: 13px; line-height: 1.6; color: #bbb; }
  .formula-row span { font-size: 8px; letter-spacing: 2px; color: var(--accent2); text-transform: uppercase; display: block; margin-bottom: 3px; }

  .quote-wrap { padding: 28px 0; margin: 24px 0; position: relative; text-align: center; }
  .quote-wrap::before, .quote-wrap::after {
    content: ''; position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }
  .quote-wrap::before { top: 0; }
  .quote-wrap::after { bottom: 0; }

  .quote-text {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(1rem, 2.8vw, 1.3rem); font-weight: 300;
    line-height: 1.6; color: var(--accent); letter-spacing: 0.3px;
  }

  .reset-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Courier Prime', monospace; font-size: 10px;
    letter-spacing: 3px; cursor: pointer; text-transform: uppercase;
    margin-top: 40px; display: block; width: 100%; text-align: center;
    padding: 14px; border-top: 1px solid var(--border); transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--text); }

  .footer { text-align: center; font-size: 8px; color: #222; letter-spacing: 2px; text-transform: uppercase; margin-top: 12px; }

  .error-msg { color: #c87070; font-size: 11px; margin-top: 6px; display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">PSYCHO<span>TYPE</span></div>
    <div class="tagline">Твоя музыка — твоё зеркало</div>
    <div class="divider"></div>
  </header>

  <div id="form-section">
    <span class="section-label">Введи любимых исполнителей (5–8)</span>
    <div class="artists-grid">
      <input class="artist-slot" placeholder="исполнитель 1" />
      <input class="artist-slot" placeholder="исполнитель 2" />
      <input class="artist-slot" placeholder="исполнитель 3" />
      <input class="artist-slot" placeholder="исполнитель 4" />
      <input class="artist-slot" placeholder="исполнитель 5" />
      <input class="artist-slot" placeholder="исполнитель 6" />
      <input class="artist-slot" placeholder="исполнитель 7" />
      <input class="artist-slot" placeholder="исполнитель 8" />
    </div>

    <div class="presets">
      <span class="section-label" style="display:inline;margin-right:8px">Примеры:</span>
      <button class="preset-btn" onclick="loadPreset('dark')">тёмный романтик</button>
      <button class="preset-btn" onclick="loadPreset('indie')">инди-меланхолик</button>
      <button class="preset-btn" onclick="loadPreset('mainstream')">мейнстрим</button>
      <button class="preset-btn" onclick="loadPreset('russian')">русская сцена</button>
    </div>

    <div class="error-msg" id="error-msg">Введи хотя бы 3 исполнителя</div>
    <button class="analyze-btn" onclick="analyze()">Узнать свой психотип</button>
    <div class="footer">© 2026 Psychotype · Daniel Gelevsky</div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-symbol">⊕</div>
    <div class="loading-text" id="loading-text">Читаю твою душу...</div>
  </div>

  <div class="result" id="result">
    <div class="archetype-hero">
      <div class="archetype-name" id="archetype-name"></div>
      <div class="archetype-sub" id="archetype-sub"></div>
      <div class="essence-tags" id="essence-tags"></div>
      <div class="bars" id="bars"></div>
    </div>
    <div id="result-blocks"></div>
    <div class="quote-wrap"><div class="quote-text" id="quote-text"></div></div>
    <button class="reset-btn" onclick="reset()">← пройти заново</button>
  </div>

</div>
<script>
const presets = {
  dark: ['Lebanon Hanover','She Past Away','Twin Tribes','Crystal Castles','Hante','Selofan','Molchat Doma','Clan of Xymox'],
  indie: ['Radiohead','Bon Iver','Portishead','Massive Attack','Beach House','Tame Impala','Nick Drake','James Blake'],
  mainstream: ['Taylor Swift','Billie Eilish','The Weeknd','Drake','Adele','Ed Sheeran','Coldplay','Imagine Dragons'],
  russian: ['Земфира','Кино','Аффинаж','Буерак','Монеточка','Oxxxymiron','Ploho','культодиночества']
};

const loadingTexts = ['Читаю твою душу...','Ищу твой психотип...','Погружаюсь в музыку...','Слышу тебя между строк...'];

const BANNED_WORDS = ['одиночество','молчание','глубина','дистанция','темнота','стены'];
const BANNED_WORD_LIMIT = 2;

function loadPreset(name) {
  const slots = document.querySelectorAll('.artist-slot');
  presets[name].forEach((a,i) => { if(slots[i]) slots[i].value = a; });
}

function getArtists() {
  return Array.from(document.querySelectorAll('.artist-slot')).map(s=>s.value.trim()).filter(Boolean);
}

// Безопасная вставка текста: экранирует HTML, чтобы ответ модели
// не мог вставить теги/скрипты на страницу
function escapeHtml(str) {
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function wordCount(str) {
  if(!str) return 0;
  return String(str).trim().split(/\s+/).filter(Boolean).length;
}

function countOccurrences(text, word) {
  if(!text) return 0;
  const re = new RegExp(word, 'gi');
  const m = text.match(re);
  return m ? m.length : 0;
}

// Модель иногда возвращает числа строками ("82" вместо 82).
// Приводим к числу там, где это безопасно, до валидации.
function toNumber(v) {
  if(typeof v === 'number') return v;
  if(typeof v === 'string' && v.trim() !== '' && !isNaN(v)) return Number(v);
  return NaN;
}

function normalizeProfile(p) {
  if(!p || typeof p !== 'object') return p;
  (p.bars||[]).forEach(b => { b.value = toNumber(b.value); });
  if(p.musicPattern) (p.musicPattern.dna||[]).forEach(d => { d.score = toNumber(d.score); });
  if(p.closeness) p.closeness.confidence = toNumber(p.closeness.confidence);
  return p;
}

// Проверяет структуру и качество профиля. Возвращает { ok, errors }
function validateProfile(p, artists) {
  const errors = [];

  if(!p || typeof p !== 'object') return { ok:false, errors:['profile is not an object'] };

  if(!p.title || wordCount(p.title) < 2) errors.push('title missing or too short');
  if(!p.subtitle) errors.push('subtitle missing');

  if(!Array.isArray(p.essenceTags) || p.essenceTags.length !== 3) errors.push('essenceTags must be array of exactly 3');

  if(!Array.isArray(p.bars) || p.bars.length !== 5) {
    errors.push('bars must be array of exactly 5');
  } else {
    p.bars.forEach((b,i) => {
      if(isNaN(b.value) || b.value < 0 || b.value > 100) errors.push(`bars[${i}].value out of range`);
      if(!b.label) errors.push(`bars[${i}].label missing`);
    });
  }

  if(!p.musicPattern || !p.musicPattern.text) errors.push('musicPattern.text missing');
  if(p.musicPattern && !Array.isArray(p.musicPattern.dna)) errors.push('musicPattern.dna must be array');

  if(!Array.isArray(p.chapters) || p.chapters.length !== 4) {
    errors.push('chapters must be array of exactly 4');
  } else {
    p.chapters.forEach((c,i) => {
      if(!c.title || !c.text) errors.push(`chapters[${i}] missing title/text`);
      const wc = wordCount(c.text);
      if(wc > 130) errors.push(`chapters[${i}] too long (${wc} words)`);
    });
  }

  if(!p.blindSpot || !p.blindSpot.text) errors.push('blindSpot.text missing');
  if(p.blindSpot && wordCount(p.blindSpot.text) > 120) errors.push('blindSpot too long');

  if(!p.closeness || !p.closeness.text) errors.push('closeness.text missing');
  if(p.closeness) {
    if(wordCount(p.closeness.text) > 110) errors.push('closeness too long');
    if(![1,2,3].includes(p.closeness.confidence)) errors.push('closeness.confidence must be 1-3');
  }

  // artistNotes должен покрывать КАЖДОГО артиста из пользовательского списка,
  // а не только тех, кого модель решила упомянуть
  if(Array.isArray(artists) && artists.length) {
    if(!Array.isArray(p.artistNotes)) {
      errors.push('artistNotes missing');
    } else {
      const covered = new Set(
        p.artistNotes.map(n => (n.inputName||'').trim().toLowerCase())
      );
      artists.forEach(a => {
        if(!covered.has(a.trim().toLowerCase())) errors.push(`artistNotes missing entry for "${a}"`);
      });
    }
  }

  if(!p.shadow || !p.shadow.text) errors.push('shadow.text missing');

  if(!p.musicFunction || !Array.isArray(p.musicFunction.helps) || !Array.isArray(p.musicFunction.traps)) {
    errors.push('musicFunction.helps/traps must be arrays');
  }

  if(!p.finalFormula || !p.finalFormula.outside || !p.finalFormula.inside || !p.finalFormula.strength || !p.finalFormula.vulnerability) {
    errors.push('finalFormula incomplete');
  }

  if(!p.finalQuote || wordCount(p.finalQuote) < 5) errors.push('finalQuote missing or too short');

  // Проверка повторов запрещённых слов по всему тексту
  const allText = [
    p.musicPattern && p.musicPattern.text,
    ...(p.chapters||[]).map(c=>c.text),
    p.blindSpot && p.blindSpot.text,
    p.closeness && p.closeness.text,
    p.shadow && p.shadow.text,
    p.finalQuote
  ].filter(Boolean).join(' ');

  BANNED_WORDS.forEach(w => {
    const count = countOccurrences(allText, w);
    if(count > BANNED_WORD_LIMIT) errors.push(`word "${w}" used ${count} times (max ${BANNED_WORD_LIMIT})`);
  });

  return { ok: errors.length === 0, errors };
}

function buildPrompt(artists, retryErrors) {
  let retryNote = '';
  if(retryErrors && retryErrors.length) {
    retryNote = `\n\nПРЕДЫДУЩАЯ ПОПЫТКА НЕ ПРОШЛА ПРОВЕРКУ. Исправь эти конкретные проблемы:\n${retryErrors.join('\n')}\n`;
  }

  return `Ты — литературный редактор PSYCHOTYPE, автор психологических портретов по музыкальному вкусу. Список любимых исполнителей человека: ${artists.join(', ')}.${retryNote}

ГЛАВНАЯ ФОРМУЛА: музыка даёт основания, Big Five даёт структуру, литературный текст даёт узнавание себя. Примерно 25% текста — про музыку, 75% — литературный портрет человека: противоречия, поведение, сила и риск. Музыка ПОДТВЕРЖДАЕТ вывод, а не пересказывает список артистов.

ИМЕНА АРТИСТОВ: для каждого имени в списке верни объект с полями inputName (точно как ввёл пользователь) и canonicalName (вероятное правильное написание, если ты уверен, что в имени опечатка или неточность; если сомневаешься — canonicalName = inputName). Также укажи status: "known" если ты уверенно знаешь артиста и его стиль, "uncertain" если знаешь плохо или не уверен. НЕ выдумывай факты про uncertain-артистов и не строй на них конкретные выводы — учитывай только как часть общего сочетания.

Внутренний каркас (не показывай как список терминов):
1. Большая пятёрка (Big Five/OCEAN) — видима, но вплетена в главы, не пересказана пятью сухими абзацами
2. Теория привязанности — коротко и осторожно, без диагноза типа привязанности

СТРОГИЙ РЕДАКЦИОННЫЙ РЕГЛАМЕНТ:
- Не выдумывай конкретные бытовые привычки ("редко смеёшься", "даёшь три шанса") — это выдуманная биография
- Не утверждай конкретные травмы и страхи (страх покинутости, страх поглощения и т.п.)
- Запрещены клишированные ИИ-метафоры: электричество, синтетические пустоты, подземелья, витраж отчуждения, тень красоты
- Слова "глубина", "боль", "молчание", "одиночество", "темнота", "стены" — максимум 2 раза каждое во всём ответе
- Три essenceTags должны быть РАЗНЫМИ по смыслу, не синонимами
- Название (title) — естественное, без вычурных метафор
- КАЖДАЯ из четырёх глав должна иметь уникальный смысловой центр: 1) восприятие мира, 2) принятие решений и доведение до результата, 3) контакт и конфликт с людьми, 4) главное внутреннее противоречие. Не варьируй один и тот же мотив четыре раза
- Глава = 70-110 слов, СТРОГО не больше 120
- blindSpot = 70-100 слов, один настоящий инсайт, не комплимент
- closeness = 60-90 слов, с пометкой неуверенности внутри текста, confidence — целое число 1-3
- ВСЕ заголовки — законченные фразы, без "?"
- Финальная цитата — без диагностики травмы, 15-25 слов

Ответь ТОЛЬКО в JSON (без markdown), СТРОГО соблюдая структуру:
{
  "title": "название 2-5 слов",
  "subtitle": "фраза-подзаголовок 8-15 слов",
  "essenceTags": ["характеристика 1", "характеристика 2", "характеристика 3"],
< truncated lines 185-225 >
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: prompt })
  });

  if(!res.ok) {
    throw new Error(`Сервер ответил с ошибкой (${res.status}). Попробуй ещё раз через минуту.`);
  }

  const data = await res.json();

  if(!data || !Array.isArray(data.content)) {
    throw new Error('Неожиданный формат ответа сервера.');
  }

  const text = data.content.map(i=>i.text||'').join('');
  let parsed;
  try {
    parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    throw new Error('Не удалось разобрать ответ модели как JSON.');
  }
  return parsed;
}

async function analyze() {
  const artists = getArtists();
  if(artists.length < 3) { document.getElementById('error-msg').style.display='block'; return; }
  document.getElementById('error-msg').style.display='none';
  document.getElementById('form-section').style.display='none';

  const loading = document.getElementById('loading');
  loading.classList.add('visible');
  document.getElementById('loading-text').textContent = loadingTexts[Math.floor(Math.random()*loadingTexts.length)];

  try {
    let p = normalizeProfile(await callModel(buildPrompt(artists)));
    let check = validateProfile(p, artists);

    if(!check.ok) {
      // Один повтор с указанием конкретных ошибок
      document.getElementById('loading-text').textContent = 'Уточняю портрет...';
      p = normalizeProfile(await callModel(buildPrompt(artists, check.errors)));
      check = validateProfile(p, artists);
    }

    if(!check.ok) {
      loading.classList.remove('visible');
      document.getElementById('form-section').style.display='block';
      alert('Не удалось собрать качественный портрет с этим списком. Попробуй ещё раз или измени список артистов.');
      console.warn('validateProfile errors:', check.errors);
      return;
    }

    // лёгкая защита от сломанных заголовков
    function cleanTitle(t, fallback) {
      if(!t) return fallback;
      t = t.trim();
      if(t.endsWith('?') || t.split(' ').length < 2) return fallback;
      return t;
    }
    p.title = cleanTitle(p.title, 'Твой музыкальный портрет');
    if(p.closeness) p.closeness.title = cleanTitle(p.closeness.title, 'Как ты подпускаешь людей');
    if(p.shadow) p.shadow.title = cleanTitle(p.shadow.title, 'Когда защита становится характером');
    (p.chapters||[]).forEach(c => { c.title = cleanTitle(c.title, 'Наблюдение'); });

    loading.classList.remove('visible');

    document.getElementById('archetype-name').textContent = p.title;
    document.getElementById('archetype-sub').textContent = p.subtitle;

    const tagsEl = document.getElementById('essence-tags');
    tagsEl.innerHTML = '';
    (p.essenceTags||[]).forEach(t => {
      tagsEl.innerHTML += `<div class="essence-tag">${escapeHtml(t)}</div>`;
    });

    const barsEl = document.getElementById('bars');
    barsEl.innerHTML = '';
    (p.bars||[]).forEach(b => {
      barsEl.innerHTML += `<div class="bar-row">
        <div class="bar-label">${escapeHtml(b.label)}<small>${escapeHtml(b.plain)}</small></div>
        <div class="bar-track"><div class="bar-fill" data-val="${b.value}%"></div></div>
        <div class="bar-pct">${b.value}%</div>
      </div>`;
    });

    const blocksEl = document.getElementById('result-blocks');
    blocksEl.innerHTML = '';

    if(p.musicPattern) {
      let dnaHtml = '';
      (p.musicPattern.dna||[]).forEach(d => {
        dnaHtml += `<div class="bar-row">
          <div class="bar-label">${escapeHtml(d.label)}</div>
          <div class="bar-track"><div class="bar-fill" data-val="${d.score}%"></div></div>
          <div class="bar-pct">${d.score}%</div>
        </div>`;
      });
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header"><div class="block-title">Что объединяет твою музыку</div></div>
        <div class="block-text">${escapeHtml(p.musicPattern.text)}</div>
        <div style="margin-top:16px">${dnaHtml}</div>
      </div>`;
    }

    (p.chapters||[]).forEach(c => {
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header"><div class="block-title">${escapeHtml(c.title)}</div></div>
        <div class="block-text">${escapeHtml(c.text)}</div>
      </div>`;
    });

    if(p.blindSpot) {
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header"><div class="block-title">Что ты можешь в себе не замечать</div></div>
        <div class="block-text">${escapeHtml(p.blindSpot.text)}</div>
      </div>`;
    }

    if(p.closeness) {
      const conf = p.closeness.confidence || 2;
      const stars = '★'.repeat(conf) + '☆'.repeat(3-conf);
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header"><div class="block-title">${escapeHtml(p.closeness.title)}</div></div>
        <div class="block-text">${escapeHtml(p.closeness.text)}</div>
        <div class="confidence-stars">${stars} <span style="opacity:.6;font-size:12px">Уверенность интерпретации: ${conf} из 3</span></div>
      </div>`;
    }

    if(p.shadow) {
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header"><div class="block-title">${escapeHtml(p.shadow.title)}</div></div>
        <div class="block-text">${escapeHtml(p.shadow.text)}</div>
      </div>`;
    }

    if(p.musicFunction) {
      let helpsHtml = (p.musicFunction.helps||[]).map(h=>`<li>${escapeHtml(h)}</li>`).join('');
      let trapsHtml = (p.musicFunction.traps||[]).map(t=>`<li>${escapeHtml(t)}</li>`).join('');
      blocksEl.innerHTML += `<div class="result-block">
        <div class="block-header"><div class="block-title">Что музыка делает для тебя</div></div>
        <div class="block-sub" style="margin-bottom:6px">Помогает</div>
        <ul class="music-function-list">${helpsHtml}</ul>
        <div class="block-sub" style="margin:14px 0 6px">Может удерживать</div>
        <ul class="music-function-list">${trapsHtml}</ul>
        <div class="block-text" style="margin-top:14px"><em>${escapeHtml(p.musicFunction.growth||'')}</em></div>
      </div>`;
    }

    if(p.finalFormula) {
      blocksEl.innerHTML += `<div class="formula-block">
        <div class="block-title" style="margin-bottom:16px;font-size:8px;letter-spacing:3px;color:var(--accent);text-transform:uppercase">Итоговая формула</div>
        <div class="formula-row"><span>Снаружи</span>${escapeHtml(p.finalFormula.outside)}</div>
        <div class="formula-row"><span>Внутри</span>${escapeHtml(p.finalFormula.inside)}</div>
        <div class="formula-row"><span>Сила</span>${escapeHtml(p.finalFormula.strength)}</div>
        <div class="formula-row" style="margin-bottom:0"><span>Уязвимость</span>${escapeHtml(p.finalFormula.vulnerability)}</div>
      </div>`;
    }

    document.getElementById('quote-text').textContent = p.finalQuote;
    document.getElementById('result').classList.add('visible');

    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.val; });
    }, 100);

  } catch(err) {
    loading.classList.remove('visible');
    document.getElementById('form-section').style.display='block';
    alert('Ошибка: ' + err.message);
    console.error(err);
  }
}

function reset() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('result-blocks').innerHTML='';
  document.getElementById('form-section').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
